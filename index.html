<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
  
  <div id="display" class="display">0</div>

  <div class="buttons">
    <button class="btn clear" onclick="buttonClearDisplay()" id="button-clear">C</button>
    <button class="btn operator" id="button-divide">/</button>
    <button class="btn operator" id="button-multiply">*</button>
    <button class="btn operator" id="button-subtract">-</button>
    <button class="btn operator" onclick="buttonAdd()" id="button-add">+</button>

    <button class="btn" onclick="inputDisplay('7')" id="button-7">7</button>
    <button class="btn" onclick="inputDisplay('8')" id="button-8">8</button>
    <button class="btn" onclick="inputDisplay('9')" id="button-9">9</button>
    

    <button class="btn" onclick="inputDisplay('4')" id="button-4">4</button>
    <button class="btn" onclick="inputDisplay('5')" id="button-5">5</button>
    <button class="btn" onclick="inputDisplay('6')" id="button-6">6</button>
    <button class="btn equal" onclick="calculate()" id="button-equals">=</button>

    <button class="btn" onclick="inputDisplay('1')" id="button-1">1</button>
    <button class="btn" onclick="inputDisplay('2')" id="button-2">2</button>
    <button class="btn" onclick="inputDisplay('3')" id="button-3">3</button>
    <button class="btn zero" onclick="inputDisplay('0')" id="button-0">0</button>
  </div>

</div>
     

<script src="script.js"></script>
</body>
</html>
